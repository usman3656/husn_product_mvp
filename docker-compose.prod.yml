# docker-compose.prod.yml
# Single-host prod stack for husn.io on a Hetzner CX32 (4 vCPU / 8 GB).
# Bring up:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Tear down: docker compose -f docker-compose.prod.yml down
#
# NOTE: `web` and `api` build from local source today. When CI/CD lands, replace
# the `build:` blocks with `image: ghcr.io/<org>/husn-{web,api}:${GIT_SHA}` and
# have GH Actions push tagged images. Compose-side change only.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:

services:
  # ---------------- Reverse proxy ----------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN_APP: ${DOMAIN_APP}
      DOMAIN_API: ${DOMAIN_API}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  # ---------------- Next.js SSR ----------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
    networks:
      - edge
      - internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # GET, not --spider (HEAD): the /healthz route only implements GET.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  # ---------------- FastAPI ----------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      ENV: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JIRA_REDIRECT_URI: https://${DOMAIN_API}/auth/jira/callback
      SLACK_REDIRECT_URI: https://${DOMAIN_API}/auth/slack/callback
      GOOGLE_REDIRECT_URI: https://${DOMAIN_API}/auth/google/callback
      MS_REDIRECT_URI: https://${DOMAIN_API}/auth/microsoft/callback
    command: ["uvicorn", "husn.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--proxy-headers", "--forwarded-allow-ips", "*"]
    networks:
      - edge
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/lite"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  # ---------------- Arq worker ----------------
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      ENV: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    command: ["arq", "husn.workers.WorkerSettings"]
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Worker shares the api image, which has a HEALTHCHECK that curls
    # /health/lite on port 8000. The worker doesn't run uvicorn, so override
    # to disable. Nothing depends_on the worker being healthy; restart policy
    # handles recovery.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  # ---------------- Postgres ----------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging

  # ---------------- Redis ----------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging
